name: Validate portfolio

on:
  pull_request:
    branches: ["master"]
  push:
    branches-ignore: ["master"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate HTML, internal links and public-safety guardrails
        run: node scripts/check-site.mjs
